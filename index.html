<!DOCTYPE html>
<html dir="ltr" lang="en">
	<head>
		<title>Bicky Bhullar</title>
		<link rel="icon" href="/favicon.png">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style type="text/css">
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
				color: #000;
				background-color: #fff;
				-webkit-font-smoothing: antialiased;
				font-size: 15px;
			}

			.site {
				max-width: 1200px;
				margin: 0 auto;
				padding: 0 60px;
			}

			/* Header */
			header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 40px 0;
			}

			header h1 {
				font-size: 20px;
				font-weight: 500;
			}

			nav {
				display: flex;
				gap: 30px;
			}

			nav a {
				color: #000;
				text-decoration: none;
				font-size: 15px;
			}

			nav a:hover {
				opacity: 0.5;
			}

			/* Hero / Bio */
			.bio {
				padding: 80px 0 120px;
			}

			.bio p {
				font-size: 32px;
				font-weight: 400;
				line-height: 1.35;
				letter-spacing: -0.01em;
			}
		</style>
	</head>
	<body>
		<div class="site">
			<header>
				<h1>Bicky Bhullar</h1>
				<nav>
					<a href="https://www.linkedin.com/in/bbhullar">LinkedIn</a>
					<a rel="me" href="https://mastodon.social/@BickyBhullar">Mastodon</a>
					<a href="http://instagram.com/bickybhullar">Instagram</a>
				</nav>
			</header>

			<section class="bio">
				<p>I drink a lot of coffee and lead software engineering for a couple of <a href="https://www.apple.com/apps/">applications at Apple</a>.</p>
			</section>

		</div>
	</body>
</html>
